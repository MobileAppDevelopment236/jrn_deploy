name: jrr_immigration_app  
description: We work beyond borders - India's Only Legally Backed Immigration & Travel App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.5
  cupertino_icons: ^1.0.2
  google_fonts: ^4.0.4
  flutter_svg: ^2.0.7
  smooth_page_indicator: ^1.0.0+2
  intl: ^0.18.1
  flutter_datetime_picker_plus: ^2.0.0
  flutter_email_sender: ^6.0.0
  connectivity_plus: ^5.0.1   
  supabase_flutter: ^2.10.3 # The main package to connect to your Supabase backend
  flutter_dotenv: ^5.0.2    # To securely store your Supabase URL and Key
  image_picker: ^1.0.4      # For uploading photos from camera/gallery
  file_picker: ^10.0.0      # For picking documents (PDFs, etc.)
  http: ^1.1.0              # For making API calls (optional but useful)
  url_launcher: ^6.1.11
  flutter_secure_storage: ^8.0.0
  shared_preferences: ^2.2.2
  sign_in_with_apple: ^7.0.1
  clipboard: ^0.1.3
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env