<!DOCTYPE html>
<html>
<head>
    <title>Password Reset - JRR Immigration</title>
    <script>
        function handleResetToken() {
            // Get token from URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const type = urlParams.get('type');

            if (token && type === 'recovery') {
                // Store token in localStorage and redirect to main app
                localStorage.setItem('reset_token', token);
                window.location.href = window.location.origin + '/jrn_deploy/';
            } else {
                // Redirect to main app if no valid token
                window.location.href = window.location.origin + '/jrn_deploy/';
            }
        }

        window.onload = handleResetToken;
    </script>
</head>
<body>
    <p>Processing password reset... Redirecting to app.</p>
</body>
</html>
